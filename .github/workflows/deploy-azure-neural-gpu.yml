name: Deploy Azure Neural GPU Containers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which Azure neural service image to build
        required: true
        default: all
        type: choice
        options:
          - all
          - hunyuan-shape-api
          - hunyuan-paint-api
      deploy:
        description: Update the existing Container App after the image push
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "deploy/azure/**"
      - ".github/workflows/deploy-azure-neural-gpu.yml"

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_HUNYUAN_SHAPE: ${{ vars.AZURE_CONTAINER_APP_HUNYUAN_SHAPE }}
  CONTAINER_APP_HUNYUAN_PAINT: ${{ vars.AZURE_CONTAINER_APP_HUNYUAN_PAINT }}

jobs:
  build-push-and-optional-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: hunyuan-shape-api
            imageName: hunyuan-shape-api
            dockerfile: deploy/azure/hunyuan-shape-api/Dockerfile
            context: .
          - service: hunyuan-paint-api
            imageName: hunyuan-paint-api
            dockerfile: deploy/azure/hunyuan-paint-api/Dockerfile
            context: .
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.target == 'all' || github.event.inputs.target == matrix.service

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve image and app names
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.service }}" in
            "hunyuan-shape-api")
              APP_NAME="${CONTAINER_APP_HUNYUAN_SHAPE}"
              ;;
            "hunyuan-paint-api")
              APP_NAME="${CONTAINER_APP_HUNYUAN_PAINT}"
              ;;
            *)
              echo "Unknown service: ${{ matrix.service }}"
              exit 1
              ;;
          esac

          echo "CONTAINER_APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${ACR_NAME}.azurecr.io/vipermesh/${{ matrix.imageName }}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "REVISION_SUFFIX=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Azure login (service principal JSON)
        if: ${{ secrets.AZURE_CREDENTIALS != '' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure login (OIDC)
        if: ${{ secrets.AZURE_CREDENTIALS == '' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        shell: bash
        run: |
          az acr login --name "${ACR_NAME}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_URI }}
            ${{ env.ACR_NAME }}.azurecr.io/vipermesh/${{ matrix.imageName }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Install Container Apps CLI extension
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true' }}
        shell: bash
        run: |
          az extension add --name containerapp --upgrade

      - name: Update Azure Container App revision
        if: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CONTAINER_APP_NAME}" ]; then
            echo "No container app name configured for ${{ matrix.service }}. Skipping deploy."
            exit 0
          fi

          az containerapp update \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${IMAGE_URI}" \
            --revision-suffix "${REVISION_SUFFIX}"

      - name: Summary
        shell: bash
        run: |
          echo "Built ${{ matrix.service }} -> ${IMAGE_URI}"
