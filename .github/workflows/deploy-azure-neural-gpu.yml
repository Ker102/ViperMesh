name: Deploy Azure Neural GPU Containers

on:
  workflow_dispatch:
    inputs:
      target:
        description: Which Azure neural service image to build
        required: true
        default: all
        type: choice
        options:
          - all
          - hunyuan-shape-api
          - hunyuan-paint-api
      deploy:
        description: Update the existing Container App after the image push
        required: true
        default: false
        type: boolean
  push:
    branches:
      - main
    paths:
      - "deploy/azure/**"
      - ".github/workflows/deploy-azure-neural-gpu.yml"

permissions:
  contents: read
  id-token: write

env:
  ACR_NAME: ${{ vars.AZURE_ACR_NAME }}
  RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
  CONTAINER_APP_HUNYUAN_SHAPE: ${{ vars.AZURE_CONTAINER_APP_HUNYUAN_SHAPE }}
  CONTAINER_APP_HUNYUAN_PAINT: ${{ vars.AZURE_CONTAINER_APP_HUNYUAN_PAINT }}

jobs:
  build-push-and-optional-deploy:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: hunyuan-shape-api
            imageName: hunyuan-shape-api
            dockerfile: deploy/azure/hunyuan-shape-api/Dockerfile
            context: .
          - service: hunyuan-paint-api
            imageName: hunyuan-paint-api
            dockerfile: deploy/azure/hunyuan-paint-api/Dockerfile
            context: .

    steps:
      - name: Preflight
        id: preflight
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          TARGET_INPUT: ${{ github.event.inputs.target }}
          DEPLOY_INPUT: ${{ github.event.inputs.deploy }}
          MATRIX_SERVICE: ${{ matrix.service }}
          AZURE_CREDENTIALS: ${{ secrets.AZURE_CREDENTIALS }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          should_run=false
          if [[ "${EVENT_NAME}" != "workflow_dispatch" || "${TARGET_INPUT:-}" == "all" || "${TARGET_INPUT:-}" == "${MATRIX_SERVICE}" ]]; then
            should_run=true
          fi

          deploy_requested=false
          if [[ "${EVENT_NAME}" == "workflow_dispatch" && "${DEPLOY_INPUT:-false}" == "true" ]]; then
            deploy_requested=true
          fi

          auth_mode=missing
          if [[ -n "${AZURE_CREDENTIALS:-}" ]]; then
            auth_mode=json
          elif [[ -n "${AZURE_CLIENT_ID:-}" && -n "${AZURE_TENANT_ID:-}" && -n "${AZURE_SUBSCRIPTION_ID:-}" ]]; then
            auth_mode=oidc
          fi

          echo "should_run=${should_run}" >> "$GITHUB_OUTPUT"
          echo "deploy_requested=${deploy_requested}" >> "$GITHUB_OUTPUT"
          echo "auth_mode=${auth_mode}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        uses: actions/checkout@v4

      - name: Validate Azure auth configuration
        if: ${{ steps.preflight.outputs.should_run == 'true' && steps.preflight.outputs.auth_mode == 'missing' }}
        shell: bash
        run: |
          echo "Azure auth is not configured. Set AZURE_CREDENTIALS or the AZURE_CLIENT_ID / AZURE_TENANT_ID / AZURE_SUBSCRIPTION_ID secrets."
          exit 1

      - name: Resolve image and app names
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          case "${{ matrix.service }}" in
            "hunyuan-shape-api")
              APP_NAME="${CONTAINER_APP_HUNYUAN_SHAPE}"
              ;;
            "hunyuan-paint-api")
              APP_NAME="${CONTAINER_APP_HUNYUAN_PAINT}"
              ;;
            *)
              echo "Unknown service: ${{ matrix.service }}"
              exit 1
              ;;
          esac

          echo "CONTAINER_APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"
          echo "IMAGE_URI=${ACR_NAME}.azurecr.io/vipermesh/${{ matrix.imageName }}:${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "REVISION_SUFFIX=${GITHUB_SHA::7}" >> "$GITHUB_ENV"

      - name: Azure login (service principal JSON)
        if: ${{ steps.preflight.outputs.should_run == 'true' && steps.preflight.outputs.auth_mode == 'json' }}
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Azure login (OIDC)
        if: ${{ steps.preflight.outputs.should_run == 'true' && steps.preflight.outputs.auth_mode == 'oidc' }}
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        shell: bash
        run: |
          az acr login --name "${ACR_NAME}"

      - name: Set up Docker Buildx
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          provenance: false
          tags: |
            ${{ env.IMAGE_URI }}
            ${{ env.ACR_NAME }}.azurecr.io/vipermesh/${{ matrix.imageName }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}

      - name: Install Container Apps CLI extension
        if: ${{ steps.preflight.outputs.should_run == 'true' && steps.preflight.outputs.deploy_requested == 'true' }}
        shell: bash
        run: |
          az extension add --name containerapp --upgrade

      - name: Update Azure Container App revision
        if: ${{ steps.preflight.outputs.should_run == 'true' && steps.preflight.outputs.deploy_requested == 'true' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ -z "${CONTAINER_APP_NAME}" ]; then
            echo "No container app name configured for ${{ matrix.service }}. Skipping deploy."
            exit 0
          fi

          az containerapp update \
            --name "${CONTAINER_APP_NAME}" \
            --resource-group "${RESOURCE_GROUP}" \
            --image "${IMAGE_URI}" \
            --revision-suffix "${REVISION_SUFFIX}"

      - name: Skip unmatched workflow-dispatch target
        if: ${{ steps.preflight.outputs.should_run != 'true' }}
        shell: bash
        run: |
          echo "Skipping ${{ matrix.service }} because it does not match the requested target."

      - name: Summary
        if: ${{ steps.preflight.outputs.should_run == 'true' }}
        shell: bash
        run: |
          echo "Built ${{ matrix.service }} -> ${IMAGE_URI}"
